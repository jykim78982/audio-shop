<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 목록 - Audio Shop</title>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="list.css">
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a class="logo" href="../">🎧 AUDIO SHOP</a>
    <nav class="nav-links">
      <a href="list" aria-current="page">상품 보러가기</a>
      <a href="#" id="orders-link">주문 조회</a>
      <a href="#" id="cart-link">장바구니<span class="badge-count" id="cart-badge" hidden>0</span></a>
      <span id="guest-actions">
        <a href="../auth/login">로그인</a>
        <a href="../auth/signup">회원가입</a>
      </span>
      <span id="member-actions" hidden>
        <span id="member-name"></span>
        <button type="button" class="btn btn-outline" id="logout-btn">로그아웃</button>
      </span>
    </nav>
  </div>
</header>

<main class="page">
  <div class="container">
    <div class="list-toolbar">
      <div class="tabs" id="category-tabs">
        <button type="button" class="is-active" data-category="">ALL</button>
      </div>
      <div class="toolbar-right">
        <select id="sort-select" class="sort-select">
          <option value="default">기본순</option>
          <option value="price-asc">가격 낮은순</option>
          <option value="price-desc">가격 높은순</option>
          <option value="brand">브랜드순</option>
        </select>
        <div class="view-toggle" id="view-toggle">
          <button type="button" class="is-active" data-view="grid" aria-label="그리드 보기">⊞ 그리드보기</button>
          <button type="button" data-view="list" aria-label="목록 보기">☰ 목록보기</button>
        </div>
      </div>
    </div>

    <div class="product-grid" id="product-grid"></div>
    <p class="empty-state" id="empty-state" hidden>해당 조건의 상품이 없습니다.</p>
  </div>
</main>

<div class="modal-overlay" id="added-modal" hidden>
  <div class="card modal">
    <h3>장바구니에 담았습니다</h3>
    <p class="modal-desc">계속 쇼핑하시겠어요, 장바구니로 이동하시겠어요?</p>
    <div class="form-actions">
      <button type="button" class="btn btn-outline" id="keep-shopping-btn">쇼핑 계속하기</button>
      <button type="button" class="btn btn-primary" id="go-cart-btn">장바구니로 이동</button>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/utils.js"></script>
<script src="list.js"></script>
</body>
</html>
