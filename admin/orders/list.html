<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 관리 - Audio Shop Admin</title>
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="list.css">
</head>
<body>
<header class="admin-header">
  <div class="container admin-header-inner">
    <span class="logo">🎧 Audio Shop Admin</span>
    <nav class="admin-nav">
      <a href="../">대시보드</a>
      <a href="../products/list">상품 관리</a>
      <a href="list" aria-current="page">주문 관리</a>
    </nav>
    <button type="button" class="btn admin-logout" id="logout-btn">로그아웃</button>
  </div>
</header>

<main class="page">
  <div class="container">
    <div class="section-heading">
      <h2>주문 관리</h2>
    </div>

    <div class="tabs" id="status-tabs">
      <button type="button" class="is-active" data-status="">전체</button>
      <button type="button" data-status="접수">접수</button>
      <button type="button" data-status="배송준비중">배송준비중</button>
      <button type="button" data-status="배송중">배송중</button>
      <button type="button" data-status="배송완료">배송완료</button>
    </div>

    <div class="card">
      <table class="order-table">
        <thead>
          <tr>
            <th>주문번호</th>
            <th>주문일시</th>
            <th>주문자</th>
            <th>금액</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="order-tbody"></tbody>
      </table>
      <p class="empty-state" id="empty-state" hidden>해당 조건의 주문이 없습니다.</p>
    </div>
  </div>
</main>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script src="list.js"></script>
</body>
</html>
