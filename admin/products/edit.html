<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 수정 - Audio Shop Admin</title>
<link rel="stylesheet" href="../../common/css/style.css">
<link rel="stylesheet" href="form.css">
</head>
<body>
<header class="admin-header">
  <div class="container admin-header-inner">
    <span class="logo">🎧 Audio Shop Admin</span>
    <nav class="admin-nav">
      <a href="../index.html">대시보드</a>
      <a href="list.html" aria-current="page">상품 관리</a>
      <a href="../orders/list.html">주문 관리</a>
    </nav>
    <button type="button" class="btn admin-logout" id="logout-btn">로그아웃</button>
  </div>
</header>

<main class="page">
  <div class="container">
    <a class="back-link" href="list.html">← 상품 목록</a>

    <div class="card form-card" id="edit-card" hidden>
      <h1>상품 수정</h1>
      <form id="edit-form" novalidate>
        <p class="form-error" id="form-error" hidden></p>

        <div class="form-group">
          <label for="name">상품명</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="brand">브랜드</label>
          <input type="text" id="brand" name="brand" required>
        </div>

        <div class="form-group">
          <label for="category">카테고리</label>
          <select id="category" name="category" required></select>
        </div>

        <div class="form-group">
          <label for="price">가격 (원)</label>
          <input type="number" id="price" name="price" min="0" step="1000" required>
        </div>

        <div class="form-group">
          <label for="image">이미지 URL</label>
          <input type="text" id="image" name="image" placeholder="https://...">
        </div>

        <div class="form-group">
          <label for="description">상품 설명</label>
          <textarea id="description" name="description" rows="4"></textarea>
        </div>

        <div class="form-group form-checkbox">
          <label><input type="checkbox" id="soldOut" name="soldOut"> 품절</label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">저장</button>
          <a class="btn btn-outline" href="list.html">취소</a>
        </div>
      </form>
    </div>

    <p class="empty-state" id="not-found" hidden>상품을 찾을 수 없습니다.</p>
  </div>
</main>
<script src="../../common/js/storage.js"></script>
<script src="edit.js"></script>
</body>
</html>
