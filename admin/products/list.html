<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상품 관리 - Audio Shop Admin</title>
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="list.css">
</head>
<body>
<header class="admin-header">
  <div class="container admin-header-inner">
    <span class="logo">🎧 Audio Shop Admin</span>
    <nav class="admin-nav">
      <a href="../">대시보드</a>
      <a href="list" aria-current="page">상품 관리</a>
      <a href="../orders/list">주문 관리</a>
    </nav>
    <button type="button" class="btn admin-logout" id="logout-btn">로그아웃</button>
  </div>
</header>

<main class="page">
  <div class="container">
    <div class="section-heading">
      <h2>상품 관리</h2>
      <div class="section-heading-right">
        <div class="view-toggle" id="view-toggle">
          <button type="button" data-view="list" class="is-active">☰ 목록보기</button>
          <button type="button" data-view="grid">⊞ 그리드보기</button>
        </div>
        <a class="btn btn-primary" href="create">+ 상품 등록</a>
      </div>
    </div>

    <div class="card" id="table-view">
      <table class="product-table">
        <thead>
          <tr>
            <th>상품명</th>
            <th>브랜드</th>
            <th>카테고리</th>
            <th>가격</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="product-tbody"></tbody>
      </table>
      <p class="empty-state" id="empty-state-table" hidden>등록된 상품이 없습니다.</p>
    </div>

    <div class="product-grid" id="product-grid" hidden></div>
    <p class="empty-state" id="empty-state-grid" hidden>등록된 상품이 없습니다.</p>
  </div>
</main>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script src="list.js"></script>
</body>
</html>
