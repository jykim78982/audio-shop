<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script>(function () { var p = location.pathname; var last = p.slice(p.lastIndexOf("/") + 1); if (last.indexOf(".") === -1 && p.slice(-1) !== "/") location.replace(p + "/" + location.search + location.hash); })();</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장바구니 - Audio Shop</title>
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="index.css">
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a class="logo" href="../../">🎧 AUDIO SHOP</a>
    <nav class="nav-links">
      <a href="../../products/list">상품 보러가기</a>
      <a href="../orders/list">주문 조회</a>
      <a href="./" aria-current="page">장바구니<span class="badge-count" id="cart-badge" hidden>0</span></a>
      <span id="member-actions">
        <span id="member-name"></span>
        <button type="button" class="btn btn-outline" id="logout-btn">로그아웃</button>
      </span>
    </nav>
  </div>
</header>

<main class="page">
  <div class="container">
    <div class="section-heading">
      <h2>장바구니</h2>
      <button type="button" class="btn btn-outline" id="clear-cart-btn">전체 비우기</button>
    </div>

    <div class="cart-layout" id="cart-layout" hidden>
      <div class="card cart-list" id="cart-list"></div>

      <div class="card cart-summary">
        <div class="form-group">
          <label for="address">배송지</label>
          <textarea id="address" rows="3" placeholder="배송받으실 주소를 입력해주세요."></textarea>
        </div>
        <p class="form-error" id="address-error" hidden>배송지를 입력해주세요.</p>
        <div class="summary-row">
          <span>총 상품 금액</span>
          <strong id="cart-total">0원</strong>
        </div>
        <button type="button" class="btn btn-primary btn-block" id="checkout-btn">결제하기</button>
      </div>
    </div>

    <div class="empty-state" id="empty-state" hidden>
      <p>장바구니가 비어있습니다.</p>
      <a class="btn btn-primary" href="../../products/list">상품 보러가기</a>
    </div>
  </div>
</main>

<div class="modal-overlay" id="checkout-modal" hidden>
  <div class="card modal">
    <h3>결제를 진행할까요?</h3>
    <p class="modal-desc">실제 결제는 이루어지지 않는 모의 결제입니다.</p>

    <p class="payment-label">결제 수단</p>
    <div class="payment-methods" id="payment-methods">
      <label class="payment-option">
        <input type="radio" name="payment" value="카드" checked>
        <span>카드</span>
      </label>
      <label class="payment-option">
        <input type="radio" name="payment" value="네이버페이">
        <span>네이버페이</span>
      </label>
      <label class="payment-option">
        <input type="radio" name="payment" value="카카오페이">
        <span>카카오페이</span>
      </label>
    </div>

    <div class="summary-row">
      <span>결제 금액</span>
      <strong id="modal-total">0원</strong>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-primary" id="confirm-checkout-btn">결제 확인</button>
      <button type="button" class="btn btn-outline" id="cancel-checkout-btn">취소</button>
    </div>
  </div>
</div>

<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script src="index.js"></script>
</body>
</html>
