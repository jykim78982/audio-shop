<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 조회 - Audio Shop</title>
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="lookup.css">
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a class="logo" href="../../">🎧 AUDIO SHOP</a>
    <nav class="nav-links">
      <a href="../../products/list">상품 보러가기</a>
      <a href="lookup" aria-current="page">주문 조회</a>
      <a href="../cart/">장바구니<span class="badge-count" id="cart-badge" hidden>0</span></a>
      <span id="guest-actions">
        <a href="../../auth/login">로그인</a>
        <a href="../../auth/signup">회원가입</a>
      </span>
      <span id="member-actions" hidden>
        <span id="member-name"></span>
        <button type="button" class="btn btn-outline" id="logout-btn">로그아웃</button>
      </span>
    </nav>
  </div>
</header>

<main class="page lookup-page">
  <div class="container">
    <div class="lookup-card card">
      <p class="eyebrow">Order Lookup</p>
      <h1>비회원 주문 조회</h1>
      <p class="lookup-desc">주문 시 입력하신 주문번호와 연락처를 입력해주세요.</p>

      <form id="lookup-form" novalidate>
        <p class="form-error" id="form-error" hidden></p>
        <div class="form-group">
          <label for="order-id">주문번호</label>
          <input type="text" id="order-id" placeholder="예: o20260701-001" required>
        </div>
        <div class="form-group">
          <label for="phone">연락처</label>
          <input type="tel" id="phone" placeholder="예: 010-1234-5678" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">조회하기</button>
      </form>

      <p class="lookup-hint">회원이신가요? <a href="../../auth/login">로그인</a> 후 주문 내역에서 바로 확인하실 수 있어요.</p>
    </div>
  </div>
</main>
<script src="../../js/data.js"></script>
<script src="../../js/utils.js"></script>
<script src="lookup.js"></script>
</body>
</html>
